apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask
        image: cithit/eschenea:latest                              #<-------change this to match your MiamiID
        ports:
        - containerPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-ingress
spec:
  rules:
  - host:
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: prod-service
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: prod-service
spec:
  type: LoadBalancer
  loadBalancerIP: 10.48.228.102                                     #<-----change this to match your load balancer IP!!!!
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  selector:
    app: flask
